- "<bold>Lore</bold>


Each region carries its own record.


When you discover a region, its record is added to your collection — written by those who have walked its ground before you."

- "To read a region’s record, use <dark_green>/lore [region name]</dark_green>


Not everything is said plainly. Some things are meant to be noticed."