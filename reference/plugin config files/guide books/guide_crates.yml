- "<bold>Crates & keys</bold>


Discovering regions, villages, and region hearts rewards keys.


Keys can be used to open crates and obtain items and tools.


These are virtual keys, so they won’t appear in your inventory."

- "You can check them with <dark_green>/keys</dark_green> and open crates with <dark_green>/cc</dark_green>."

