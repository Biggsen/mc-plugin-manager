title: Guide Protection
author: Admin
pages:
- "<bold>Protection</bold>


When you place chests, they are private and protected by default.


You can lock and unlock containers with <dark_green>/lock</dark_green> and <dark_green>/unlock</dark_green>.


Give friends access using <dark_green>/bolt trust add <player></dark_green>."

- "<bold>Claiming land</bold>


You start with 100 claim blocks to claim your first area.


You can earn more by discovering structures as you explore.


Use them to secure places you want to build in or return to."

- "Use a golden shovel to create and expand claims.


Inside your claim, other players cannot build or break blocks.


You can manage access and permissions as needed."

