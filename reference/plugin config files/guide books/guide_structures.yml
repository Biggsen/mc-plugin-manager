title: Guide Structures
author: Admin
pages:
- "<bold>Structures & rewards</bold>


As you explore, you may come across structures across the world.


These include things like ruins, temples, and other points of interest."

- "Discovering structures rewards experience and claim blocks.


Rarer or harder-to-find structures provide greater rewards."

- "Structures are optional discoveries.


They don’t count toward your main exploration completion, but reward those who go off the beaten path."

- "<bold>Tracking structures</bold>


You can switch your scoreboard to view structure discoveries using <dark_green>/structures</dark_green>.

Use <dark_green>/main</dark_green> to return to your main exploration view."